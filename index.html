<!DOCTYPE html>
<html>
  <head>
    <title>Scooter Lim</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Poppins Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="contenuto">
      <header>
        <!-- Logo e motto -->
        <img class="logo" src="immagini/logo.png">
        <h1>Taking Booleaners from A to B</h1>
      </header>

      <!-- Form di prenotazione -->
      <form action="index.html" method="post">

        <!-- Pulsanti per la prenotazione -->
        <div class="pulsanti">
          <input type="submit" name="prenota" value="Prenota">
          <button type="button" name="termina">Termina Prenotazione</button>
          <button type="button" name="luci">Accendi Luci</button>
        </div>

        <!-- Monopattini disponibili -->
        <div class="opzioni-disponibili">

          <!-- Monopattino di Gino22 -->
          <div class="monopattino">
            <input type="checkbox">
            <h2>Monopattino Gino22</h2>
            <div><span>&#8614;</span> Via Guadalametri - a 220 metri da te</div>
            <div>Stato carica:</div>
            <div class="barra1"></div>
          </div>

          <!-- Monopattino di Mike24 -->
          <div class="monopattino">
            <input type="checkbox">
            <h2>Monopattino Mike24</h2>
            <div><span>&#8614;</span> Via Ricciardoni - a 420 metri da te</div>
            <div>Stato carica:</div>
            <div class="barra2"></div>
          </div>

          <!-- Monopattino di Fede154 -->
          <div class="monopattino">
            <input type="checkbox">
            <h2>Monopattino Fede154</h2>
            <div><span>&#8614;</span> Via Mentarini - a 490 metri da te</div>
            <div>Stato carica:</div>
            <div class="barra3"></div>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
